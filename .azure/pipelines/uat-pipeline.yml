trigger:
  branches:
    include:
      - release/*

stages:
  - stage: Deploy_UAT
    jobs:
      - deployment: UATDeploy
        environment: uat
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    helm upgrade --install app ./helm \
                      --namespace uat \
                      --set image.tag=$(Build.BuildId)

  - stage: Integration_Tests
    dependsOn: Deploy_UAT
    jobs:
      - job: Tests
        steps:
          - script: |
              echo "Running integration tests..."