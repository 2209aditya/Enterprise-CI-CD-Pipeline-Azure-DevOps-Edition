# pre-prod branch → pre-prod deploy + load tests
trigger:
  branches:
    include:
      - pre-prod

stages:
  - stage: Approval
    jobs:
      - job: ManualApproval
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: "Approve Pre-Prod Deployment"

  - stage: Deploy_PreProd
    dependsOn: Approval
    jobs:
      - deployment: PreProdDeploy
        environment: pre-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    helm upgrade --install app ./helm \
                      --namespace pre-prod \
                      --set image.tag=$(Build.BuildId)

  - stage: Load_Test
    dependsOn: Deploy_PreProd
    jobs:
      - job: LoadTest
        steps:
          - script: echo "Running load tests..."
