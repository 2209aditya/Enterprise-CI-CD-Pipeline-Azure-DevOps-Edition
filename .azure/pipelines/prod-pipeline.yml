trigger:
  branches:
    include:
      - main

stages:
  - stage: Approval
    jobs:
      - job: DualApproval
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              instructions: "First approval for PROD"
          - task: ManualValidation@0
            inputs:
              instructions: "Second approval for PROD"

  - stage: Deploy_Prod
    dependsOn: Approval
    jobs:
      - deployment: ProdDeploy
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    # Canary rollout (10%)
                    helm upgrade --install app ./helm \
                      --namespace prod \
                      --set image.tag=$(Build.BuildId) \
                      --set replicaCount=2

                - script: |
                    echo "Monitoring canary..."

                - script: |
                    # Full rollout
                    helm upgrade app ./helm \
                      --namespace prod \
                      --set image.tag=$(Build.BuildId) \
                      --set replicaCount=10